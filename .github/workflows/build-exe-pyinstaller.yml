name: Build EXE file w/ PyInstaller GH Action
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/*exe*"
      - "src/network_puzzles/**"
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Python dev tools
        shell: bash
        run: |
          python -m pip install -U pip
          python -m pip install wheel setuptools

      - name: Install project
        shell: bash
        run: python -m pip install .

      - name: Install PyInstaller
        shell: bash
        run: |
          python -m pip install pyinstaller
          # Install Kivy window/audio dependencies explicitly for Windows
          # python -m pip install kivy.deps.sdl2 kivy.deps.glew pypiwin32

      - name: Install OpenGL fallback
        shell: powershell
        run: |
          # Install OpenGL support
          $version = "26.1.1"
          $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$version/mesa3d-$version-release-mingw.7z"
          Invoke-WebRequest -Uri "$url" -OutFile "mesa.7z"
          & "${env:ProgramFiles}/7-Zip/7z.exe" x "mesa.7z" -o"mesa" -y

      - name: Run PyInstaller
        id: pyinstaller
        shell: bash
        env:
          KIVY_NO_CONSOLELOG: 1 # avoid duplicate console logging
          KIVY_GL_BACKEND: dummy # prevents openGL error
          # KIVY_WINDOW: dummy
          PYI_LOG_LEVEL: DEBUG
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            pyinstaller.spec 2>&1 | tee pyinstaller.log

      - name: Log build/dist files
        if: always()
        shell: bash
        run: |
          echo "build:" | tee -a pyinstaller-files.txt
          ls -l build/ | tee -a pyinstaller-files.txt
          echo "build/pyinstaller:" | tee -a pyinstaller-files.txt
          ls -l build/pyinstaller/ | tee -a pyinstaller-files.txt
          echo "dist:" | tee -a pyinstaller-files.txt
          ls -l dist/ | tee -a pyinstaller-files.txt

      - name: Upload Executable
        if: ${{ steps.pyinstaller.conclusion == 'success' }}
        id: artifact_upload
        uses: actions/upload-artifact@v7
        with:
          name: NetworkPuzzles
          path: ./dist
          compression-level: 0

      - name: Upload build files
        if: ${{ steps.pyinstaller.conclusion == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: build-files
          path: ./build/pyinstaller

      - name: Upload kivy & pyinstaller logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs
          # include-hidden-files: true  # needed for .kivy dir
          path: |
            # ~\\.kivy\\logs\\*.txt  # different root; requires separate step
            pyinstaller.log
            pyinstaller-files.txt
            build/pyinstaller/*.txt
