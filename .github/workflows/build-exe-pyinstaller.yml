      #   run: |
      #     echo "ENV:"
      #     env | sort
      #     echo
      #     echo "./build:"
      #     ls -l build/
      #     ls -l build/pyinstaller/

      - name: Upload Executable
        id: artifact_upload
        uses: actions/upload-artifact@v7
        with:
          name: NetworkPuzzles
          path: ./dist
          compression-level: 0

      - name: Upload kivy logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kivy-logs
          include-hidden-files: true
          path: ~\\.kivy\\logs\\*.txt

      - name: Upload pyinstaller logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pyinstaller-logs
          path: |
            pyinstaller.log
            build/pyinstaller/*.dot
            build/pyinstaller/*.html
            build/pyinstaller/*.txt
