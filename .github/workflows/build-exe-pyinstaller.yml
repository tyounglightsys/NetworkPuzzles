name: Build EXE file w/ PyInstaller GH Action
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build prereqs
        shell: powershell
        run: |
          # Install OpenGL support
          $version = "26.1.1"
          $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$version/mesa3d-$version-release-msvc.7z"
          Invoke-WebRequest -Uri "$url" -OutFile "mesa.7z"
          & "${env:ProgramFiles}/7-Zip/7z.exe" x "mesa.7z" -o"mesa" -y

      # # Install app prereqs b/c pyinstaller action only handles requirements.txt,
      # # not pyproject.toml.
      # - name: Install app preqreqs
      #   run: python -m pip install .

      - name: Build EXE with PyInstaller Action
        uses: n8marti/pyinstaller@main
        id: pyinstaller
        with:
          spec: ./pyinstaller.spec
          pyproject: ./pyproject.toml
          python_ver: "3.12"
          upload_exe_with_name: "NetworkPuzzles"
          clean_checkout: false # don't remove existing files from workdir

      - name: Upload build logs
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: build/pyinstaller/*.txt
