      # - name: Set env variables to override kivy checks
      #   if: false
      #   shell: bash
      #   run: |
      #     echo "KIVY_NO_CONSOLE=1" >> $GITHUB_ENV
      #     echo "KIVY_NO_KIVY_CONFIG=1" >> $GITHUB_ENV
      #     echo "USE_SDL2=1" >> $GITHUB_ENV
      #     echo "USE_GSTREAMER=1" >> $GITHUB_ENV

      - name: Run PyInstaller
        shell: bash
        env:
          KIVY_NO_CONSOLELOG: 1 # blocks colored console logging
          KIVY_NO_ENV_CONFIG: 1
          KIVY_WINDOW: dummy # prevents openGL error
          PYI_LOG_LEVEL: TRACE
        run: |
          pyinstaller \
            --clean \
            --noconfirm \
            pyinstaller.spec 2>&1 | tee pyinstaller.log
          echo "return code = $?"

      # - name: Build EXE with PyInstaller Action
      #   uses: n8marti/pyinstaller@main
