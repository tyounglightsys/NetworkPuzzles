name: Build EXE file w/ PyInstaller GH Action
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Python dev tools
        shell: bash
        run: |
          python -m pip install -U pip
          python -m pip install wheel setuptools

      - name: Install project
        shell: bash
        run: python -m pip install .

      - name: Install PyInstaller
        shell: bash
        run: python -m pip install pyinstaller

      - name: Install build prereqs
        if: false # skip step for now
        shell: powershell
        run: |
          # Install OpenGL support
          $version = "26.1.1"
          $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$version/mesa3d-$version-release-mingw.7z"
          Invoke-WebRequest -Uri "$url" -OutFile "mesa.7z"
          & "${env:ProgramFiles}/7-Zip/7z.exe" x "mesa.7z" -o"mesa" -y
          # Copy DLLs to pyinstaller directory.
          $PYINSTALLER_DIR = "${env:Python_ROOT_DIR}\Scripts"
          Write-Host $PYTHON_DIR
          Copy-Item "mesa/x64/*" -Destination "$PYINSTALLER_DIR"
          dir "$PYINSTALLER_DIR"
          # Add DLLs folder to $PATH
          # $env:Path += ";${{ env.GITHUB_WORKSPACE }}/mesa/x64/"

      - name: Run PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --clean \
            --log-level=DEBUG \
            --noconfirm \
            pyinstaller.spec
          echo "return code = $?"

      # - name: Build EXE with PyInstaller Action
      #   uses: n8marti/pyinstaller@main
      #   id: pyinstaller
      #   with:
      #     spec: ./pyinstaller.spec
      #     pyproject: ./pyproject.toml
      #     python_ver: "3.12"
      #     options: "--paths=${{ github.workspace }}\\mesa\\x64, --log-level=TRACE"
      #     upload_exe_with_name: "NetworkPuzzles"
      #     clean_checkout: false # don't remove existing files from workdir

      - name: Check sys info
        if: always()
        shell: bash
        run: |
          env | sort
          ls -l ${RUNNER_TOOL_CACHE}\\Python\\3.12.10\\x64\\Scripts\\
          ls -l ${RUNNER_TOOL_CACHE}\\Python\\3.12.10\\x64\\Lib\\site-packages\\

      - name: Upload Executable
        id: artifact_upload
        uses: actions/upload-artifact@v7
        with:
          name: NetworkPuzzles
          path: ./dist
          compression-level: 0

      - name: Upload kivy logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kivy-logs
          include-hidden-files: true
          path: ~\\.kivy\\logs\\*.txt

      - name: Upload pyinstaller logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pyinstaller-logs
          path: ${{ github.workspace }}\\build\\pyinstaller\\*.txt
