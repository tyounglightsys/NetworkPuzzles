name: Build EXE file w/ PyInstaller GH Action
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build prereqs
        shell: powershell
        run: |
          # Install 7zip
          # choco install 7zip.install
          # Install OpenGL support
          $version = "26.1.1"
          $url = "https://github.com/pal1000/mesa-dist-win/releases/download/$version/mesa3d-$version-release-msvc.7z"
          Invoke-WebRequest -Uri "$url" -OutFile "mesa.7z"
          # "C:/ProgramFiles/7-Zip/7z.exe" x "mesa.7z"
          Expand-7Zip -ArchveFileName "mesa.7z" -OutputPath "mesa"
          dir
          Copy-Item -Path "mesa/x64/opengl32.dll" -Destination "C:/Windows/System32/opengl32.dll" -Force

      # - name: Download and Extract Mesa3D Software Rasterizer
      #   shell: powershell
      #   run: |
      #     # Download a known working Mesa3D llvmpipe build (e.g., from an accessible release or your own artifact)
      #     # Or alternatively use an open-source pre-built opengl32.dll wrapper
      #     $mesaUrl = "YOUR_MESA_3D_DLLS_ZIP_URL"
      #     Invoke-WebRequest -Uri $mesaUrl -OutFile mesa.zip
      #     Expand-Archive mesa.zip -DestinationPath mesa_extracted

      #     # Copy opengl32.dll next to your executable directory (or into C:\Windows\System32 if absolutely necessary, though working directory is safer)
      #     # Assuming your binary is built in the 'build' folder:
      #     # Copy-Item -Path "mesa_extracted/x64/opengl32.dll" -Destination "build/Release/opengl32.dll" -Force
      #     Copy-Item -Path "mesa_extracted/x64/opengl32.dll" -Destination "C:/Windows/System32/opengl32.dll" -Force

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          # python3 -m pip install pyopengl pyopengl-accelerate

      - name: Install app python package
        run: python3 -m pip install .

      - name: Build EXE with PyInstaller Action
        uses: sayyid5416/pyinstaller@v1
        id: pyinstaller
        with:
          spec: ./pyinstaller.spec
          python_ver: "3.12"
          upload_exe_with_name: "NetworkPuzzles"

