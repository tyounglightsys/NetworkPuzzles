name: Create/update draft releases
on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  get-version:
    outputs:
      version: ${{ steps.version.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - id: version
        run: |
          version_file = src/network_puzzles/__init__.py
          regexp = '(?<=__version__ = ")[0-9a-z.~+-]+(?=")'
          version=$(grep -oP "$regexp" "$version_file")
          echo "$regexp; $version_file -> $version"
          echo "version=$version" >> $GITHUB_OUTPUT

  update-release-draft:
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: prepare release draft
        id: release
        uses: release-drafter/release-drafter@v7
        with:
          version: ${{ needs.get-version.outputs.version }}

  update-prerelease-draft:
    outputs:
      tag_name: ${{ steps.prerelease.outputs.tag_name }}
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: prepare prerelease draft
        id: prerelease
        uses: release-drafter/release-drafter@v7
        with:
          version: ${{ needs.get-version.outputs.version }}
          prerelease: true
          prerelease-identifier: "rc"

  run-tests:
    uses: ./.github/workflows/run-tests.yml

  build-exe:
    needs: run-tests
    uses: ./.github/workflows/build-exe-pyinstaller.yml

  build-apk:
    needs: run-tests
    uses: ./.github/workflows/build-apk-docker-image.yml

  upload-exes:
    needs: [build-exe, update-prerelease-draft, update-release-draft]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: NetworkPuzzles.exe
          
      - name: upload prerelease EXE
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        run: gh release upload ${{ needs.update-prerelease-draft.outputs.tag_name }} NetworkPuzzles.exe --clobber

      - name: upload release EXE
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        run: gh release upload ${{ needs.update-release-draft.outputs.tag_name }} NetworkPuzzles.exe --clobber

  upload-apks:
    needs: [build-apk, update-prerelease-draft, update-release-draft]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-apk.outputs.artifact }}

      - name: upload prerelease APK
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        run: gh release upload ${{ needs.update-prerelease-draft.outputs.tag_name }} ${{ needs.build-apk.outputs.artifact }} --clobber

      - name: upload release APK
        env:
          GITHUB_TOKEN: ${{ github.TOKEN }}
        run: gh release upload ${{ needs.update-release-draft.outputs.tag_name }} ${{ needs.build-apk.outputs.artifact }} --clobber
