name: Build EXE file w/ PyInstaller GH Action
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # push:
  #   branches:
  #     - main

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      # This is too old (~6 years)
      # - name: Package Application
      #   uses: JackMcKew/pyinstaller-action-windows@main
      #   with:
      #     path: .
      #     spec: ./pyinstaller.spec

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install Python dev tools
        shell: bash
        run: |
          python -m pip install -U pip
          python -m pip install wheel setuptools

      - name: Install project
        shell: bash
        run: python -m pip install .

      - name: Install PyInstaller
        shell: bash
        run: |
          python -m pip install pyinstaller
          # Install Kivy window/audio dependencies explicitly for Windows
          # python -m pip install kivy.deps.sdl2 kivy.deps.glew pypiwin32

      # - name: Install build prereqs
